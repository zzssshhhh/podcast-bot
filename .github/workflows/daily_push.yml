name: 每日播客摘要推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装系统依赖 (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 安装 Python 依赖
        run: pip install requests feedparser openai-whisper

      - name: 运行推送脚本
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
          RSS_URL: ${{ secrets.RSS_URL }}
          ALI_ACCESS_KEY_ID: ${{ secrets.ALI_ACCESS_KEY_ID }}
          ALI_ACCESS_KEY_SECRET: ${{ secrets.ALI_ACCESS_KEY_SECRET }}
        run: python push.py
