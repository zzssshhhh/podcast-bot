name: 每日播客摘要推送

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 8:00
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装系统依赖 (ffmpeg + 中文字体)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-wqy-zenhei

      - name: 安装 Python 依赖
        run: pip install requests feedparser openai-whisper Pillow

      - name: 运行推送脚本
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
          RSS_URL: ${{ secrets.RSS_URL }}
          DASHSCOPE_API_KEY: ${{ secrets.ALI_ACCESS_KEY_ID }}
        run: python push.py
